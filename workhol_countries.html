<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f9f9f7; color: #1a1a1a; padding: 2rem 1rem; }
  .container { max-width: 780px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 0.4rem; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 1.5rem; }

  .tab-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .tab-btn {
    padding: 6px 16px; border-radius: 20px;
    border: 1px solid #ddd; background: #fff;
    color: #666; font-size: 13px; cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .tab-btn:hover:not(.active) { background: #f0f0ee; }

  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .country-card {
    background: #fff; border: 1px solid #e8e8e6;
    border-radius: 12px; padding: 14px;
    cursor: pointer; transition: border-color 0.15s;
  }
  .country-card:hover { border-color: #999; }
  .country-card.selected { border: 2px solid #1a1a1a; }
  .card-flag { font-size: 22px; margin-bottom: 6px; display: block; }
  .card-name { font-size: 13px; font-weight: 600; color: #1a1a1a; }

  .detail-panel {
    display: none; margin-top: 1.25rem;
    background: #f0f0ee; border-radius: 12px;
    padding: 1.25rem 1.5rem;
  }
  .detail-panel.visible { display: block; }
  .detail-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 1rem; padding-bottom: 1rem;
    border-bottom: 1px solid #ddd;
  }
  .detail-flag { font-size: 32px; }
  .detail-name { font-size: 17px; font-weight: 600; margin-bottom: 2px; }
  .detail-region { font-size: 12px; color: #888; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .info-item {
    background: #fff; border-radius: 8px;
    padding: 10px 12px; border: 1px solid #e8e8e6;
  }
  .info-label { font-size: 11px; color: #999; margin-bottom: 3px; }
  .info-value { font-size: 13px; font-weight: 600; color: #1a1a1a; }
  .info-note { font-size: 12px; color: #666; margin-top: 10px; line-height: 1.7; }
  .close-btn {
    margin-top: 12px; font-size: 12px; color: #999;
    cursor: pointer; background: none; border: none; padding: 0;
  }
  .close-btn:hover { color: #1a1a1a; }
  .edit-note {
    margin-top: 2rem; padding: 12px 16px;
    background: #fff3cd; border-radius: 8px;
    font-size: 12px; color: #856404; line-height: 1.6;
  }
</style>

const regions = Object.keys(countries);
let activeRegion = regions[0];
let selectedCard = null;

function renderTabs() {
  document.getElementById('tabs').innerHTML = regions.map(r =>
    `<button class="tab-btn${r === activeRegion ? ' active' : ''}" onclick="selectTab('${r}')">${r} <span style="opacity:0.5;font-size:11px;">${countries[r].length}</span></button>`
  ).join('');
}

function renderCards() {
  document.getElementById('cards').innerHTML = countries[activeRegion].map((c, i) => `
    <div class="country-card${selectedCard && selectedCard.name === c.name ? ' selected' : ''}" onclick="selectCard(${i})">
      <span class="card-flag">${c.flag}</span>
      <p class="card-name">${c.name}</p>
    </div>
  `).join('');
}

function selectTab(region) {
  activeRegion = region;
  selectedCard = null;
  document.getElementById('detail').classList.remove('visible');
  renderTabs();
  renderCards();
}

function selectCard(i) {
  const c = countries[activeRegion][i];
  if (selectedCard && selectedCard.name === c.name) { closeDetail(); return; }
  selectedCard = c;
  renderCards();
  document.getElementById('d-flag').textContent = c.flag;
  document.getElementById('d-name').textContent = c.name;
  document.getElementById('d-region').textContent = activeRegion;
  document.getElementById('d-grid').innerHTML = `
    <div class="info-item"><p class="info-label">신청 가능 나이</p><p class="info-value">${c.age}</p></div>
    <div class="info-item"><p class="info-label">선정 방식</p><p class="info-value">${c.method}</p></div>
    <div class="info-item"><p class="info-label">모집 인원</p><p class="info-value">${c.quota}</p></div>
    <div class="info-item"><p class="info-label">신청 기간</p><p class="info-value">${c.apply}</p></div>
  `;
  document.getElementById('d-note').textContent = c.note;
  document.getElementById('detail').classList.add('visible');
  document.getElementById('detail').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeDetail() {
  selectedCard = null;
  document.getElementById('detail').classList.remove('visible');
  renderCards();
}

renderTabs();
renderCards();
</script>
